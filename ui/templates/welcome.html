<!-- ui/templates/welcome.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSec - Portal de Autenticação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #141416;
            --brand-red: #da251c;
            --brand-white: #f5f5f7;
            --brand-gray: #8e8e93;
            --neon-glow: rgba(218, 37, 28, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--brand-white);
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            opacity: 1;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tech-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 22, 0) 0%, var(--bg-color) 70%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: 1;
        }

        .gateway-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: rgba(20, 20, 22, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .logo-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px auto;
        }

        .cyber-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--brand-red);
            border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        .cyber-ring-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            border: 1px dashed rgba(218, 37, 28, 0.3);
            border-bottom: 1px dashed var(--brand-white);
            border-radius: 50%;
            animation: spinReverse 4s linear infinite;
        }

        .center-logo-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseGlow 2s ease-in-out infinite;
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--brand-white);
            margin-bottom: 4px;
            animation: fadeIn 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        .brand-title span {
            color: var(--brand-red);
        }

        .brand-tagline {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--brand-gray);
            margin-bottom: 35px;
            animation: fadeIn 1s ease-out 0.6s forwards;
            opacity: 0;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.8s forwards;
        }

        .input-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--brand-white);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--brand-red);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        .btn-access {
            position: relative;
            width: 100%;
            background: var(--brand-red);
            color: var(--brand-white);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            font-size: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(218, 37, 28, 0.3);
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        .btn-access::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: all 0.6s;
        }

        .btn-access:hover {
            background: #f03e3e;
            box-shadow: 0 0 25px var(--neon-glow);
            transform: translateY(-2px);
        }

        .btn-access:hover::before {
            left: 100%;
        }

        .system-status {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            100% { transform: rotate(-360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 5px rgba(218,37,28,0.4)); }
            50% { transform: translate(-50%, -50%) scale(1.05); filter: drop-shadow(0 0 15px rgba(218,37,28,0.8)); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
        }

        .page-exit {
            opacity: 0;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="tech-bg"></div>

<div class="gateway-card" id="gatewayCard">
    <div class="logo-container">
        <div class="cyber-ring"></div>
        <div class="cyber-ring-inner"></div>
        <div class="center-logo-icon">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <rect x="40" y="20" width="20" height="30" rx="10" fill="none" stroke="#f5f5f7" stroke-width="6" transform="rotate(-30 50 50)" />
                <rect x="40" y="50" width="20" height="30" rx="10" fill="none" stroke="#f5f5f7" stroke-width="6" transform="rotate(-30 50 50)" />
                <line x1="15" x2="85" y1="85" y2="15" stroke="#da251c" stroke-width="6" stroke-linecap="round" />
                <polygon points="80,15 90,10 85,20" fill="#da251c" />
            </svg>
        </div>
    </div>

    <h1 class="brand-title">Dev<span>Sec</span></h1>
    <p class="brand-tagline">Desenvolver. Proteger. Evoluir.</p>

    {% if erro %}
    <div class="alert alert-danger py-2" role="alert" style="font-size: .85rem;">{{ erro }}</div>
    {% endif %}

    <form id="loginForm" action="/login" method="POST">
        <div class="form-group">
            <input type="text" name="usuario" class="input-control text-center" placeholder="Identidade do Analista" required autocomplete="username">
        </div>
        
        <button type="submit" class="btn-access">
            Acessar Central
        </button>
    </form>

    <div class="system-status">
        <div class="status-dot"></div>
        <span>Portal web disponível</span>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.body.classList.add('page-exit');
        
        setTimeout(() => {
            this.submit();
        }, 550);
    });
</script>

</body>
</html>
